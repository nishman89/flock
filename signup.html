<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F97316">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flock">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Make friends through shared events">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/icon-192.png">
  <title>Flock — Sign Up</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="auth-shell">

  <div class="auth-hero">
    <div class="auth-logo-wrap">
      <svg width="52" height="41" viewBox="0 0 36 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M2 25 Q9 12 18 18 Q27 12 34 25 L18 17 Z" fill="white"/>
  <path d="M0 15 Q6 5 13 10 Q20 5 26 15 L13 9 Z" fill="white"/>
  <path d="M18 8 Q22 2 27 5 Q32 2 36 8 L27 4.5 Z" fill="white"/>
</svg>
    </div>
    <h1>Flock</h1>
    <p>Join the flock. Make local friends.</p>
  </div>

  <div class="auth-card">
    <h2>Create your account ✨</h2>
    <p class="sub">Fill in your details to get started</p>

    <div class="poc-notice">
      <span class="poc-notice-icon">🚧</span>
      <p><strong>Not yet implemented</strong> — this is a proof of concept. Sign up functionality will be available in a future release. Use the demo login to explore the app.</p>
    </div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" placeholder="e.g. Jags Choongh" disabled>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" placeholder="e.g. jags@email.com" disabled>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" placeholder="Choose a username" disabled>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="Create a password" disabled>
    </div>

    <button class="btn btn-primary" disabled style="opacity:.45;cursor:not-allowed">Create Account</button>

    <div class="auth-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
</body>
</html>
