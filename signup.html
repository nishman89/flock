<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Flock — Sign Up</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="auth-shell">

  <div class="auth-hero">
    <div class="auth-logo-wrap">
      <svg width="48" height="36" viewBox="0 0 48 36" fill="none">
        <path d="M8 18 Q16 6 24 18" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M24 18 Q32 6 40 18" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M18 28 Q23 20 28 28" stroke="rgba(255,255,255,.65)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M2 10 Q6 5 10 10" stroke="rgba(255,255,255,.5)" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <h1>Flock</h1>
    <p>Join the flock. Make local friends.</p>
  </div>

  <div class="auth-card">
    <h2>Create your account ✨</h2>
    <p class="sub">Fill in your details to get started</p>

    <div class="poc-notice">
      <span class="poc-notice-icon">🚧</span>
      <p><strong>Not yet implemented</strong> — this is a proof of concept. Sign up functionality will be available in a future release. Use the demo login to explore the app.</p>
    </div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" placeholder="e.g. Jags Choongh" disabled>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" placeholder="e.g. jags@email.com" disabled>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" placeholder="Choose a username" disabled>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="Create a password" disabled>
    </div>

    <button class="btn btn-primary" disabled style="opacity:.45;cursor:not-allowed">Create Account</button>

    <div class="auth-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
