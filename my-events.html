<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Flock — My Events</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div class="header-title">My Events</div>
    <div style="width:36px"></div>
  </header>

  <div class="content">
    <div style="padding:16px" id="my-list"></div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" data-page="home" href="home.html">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Discover
    </a>
    <a class="nav-item" data-page="my-events" href="my-events.html">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      My Events
    </a>
    <a class="nav-item" data-page="profile" href="profile.html">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
  </nav>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script>
'use strict';
Flock.requireAuth();
setActiveNav('my-events');

function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}

function render() {
  const ids = Flock.getMyEvents();
  const events = EVENTS.filter(e => ids.includes(e.id));
  const el = document.getElementById('my-list');

  if (events.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🐦</div>
        <h3>No events yet</h3>
        <p>You haven't joined any events. Discover events near you and join the flock!</p>
        <a href="home.html" class="btn btn-primary" style="margin-top:8px;max-width:200px;padding:12px">Browse Events</a>
      </div>`;
    return;
  }

  el.innerHTML = `
    <p style="font-size:13px;color:var(--text3);font-weight:600;margin-bottom:12px">${events.length} event${events.length!==1?'s':''} coming up</p>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${events.map(e => `
        <a class="my-event-card" href="event.html?id=${e.id}">
          <div class="my-event-accent" style="background:${e.gradient.match(/#[0-9A-F]{6}/gi)?.[1] || '#F97316'}"></div>
          <div class="my-event-body">
            <div class="my-event-title">${e.emoji} ${e.title}</div>
            <div class="my-event-meta">
              <span>📅 ${fmtDate(e.date)}</span>
              <span>🕐 ${e.time}</span>
            </div>
            <div class="my-event-venue">📍 ${e.venue}, ${e.city}</div>
          </div>
          <div style="display:flex;align-items:center;padding-right:14px;color:var(--text3)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </a>`).join('')}
    </div>`;
}

render();
</script>
</body>
</html>
