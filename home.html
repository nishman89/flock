<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F97316">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flock">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Make friends through shared events">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/icon-192.png">
  <title>Flock — Discover</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <a class="header-logo" href="home.html">
      <div class="header-logo-icon">
        <svg width="24" height="19" viewBox="0 0 36 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M2 25 Q9 12 18 18 Q27 12 34 25 L18 17 Z" fill="white"/>
  <path d="M0 15 Q6 5 13 10 Q20 5 26 15 L13 9 Z" fill="white"/>
  <path d="M18 8 Q22 2 27 5 Q32 2 36 8 L27 4.5 Z" fill="white"/>
</svg>
      </div>
      <span class="header-brand">Flock</span>
    </a>
    <div id="greeting-text" style="font-size:13px;color:var(--text3);font-weight:600"></div>
  </header>

  <!-- City + distance filters -->
  <div class="filter-bar">
    <div class="filter-select-wrap" style="flex:1.2">
      <select class="filter-select" id="city-filter" name="city-filter" onchange="applyFilters()">
        <!-- populated by JS -->
      </select>
    </div>
    <div class="filter-select-wrap" style="flex:.9">
      <select class="filter-select" id="distance-filter" name="distance-filter" onchange="applyFilters()">
        <option value="5">5 miles</option>
        <option value="10">10 miles</option>
        <option value="25" selected>25 miles</option>
        <option value="50">50 miles</option>
        <option value="999">Any distance</option>
      </select>
    </div>
  </div>

  <!-- Category scroll tabs -->
  <div class="cat-scroll" id="cat-scroll">
    <div class="cat-chip active" id="tab-all" data-cat="All" onclick="setCat('All',this)">🌟 All</div>
    <div class="cat-chip"        id="tab-sports" data-cat="Sports" onclick="setCat('Sports',this)">⚽ Sports</div>
    <div class="cat-chip"        id="tab-food" data-cat="Food & Drink" onclick="setCat('Food & Drink',this)">🍛 Food & Drink</div>
    <div class="cat-chip"        id="tab-gaming" data-cat="Gaming" onclick="setCat('Gaming',this)">🎮 Gaming</div>
    <div class="cat-chip"        id="tab-fitness" data-cat="Fitness" onclick="setCat('Fitness',this)">🏋️ Fitness</div>
    <div class="cat-chip"        id="tab-social" data-cat="Social" onclick="setCat('Social',this)">🍺 Social</div>
    <div class="cat-chip"        id="tab-wellness" data-cat="Wellness" onclick="setCat('Wellness',this)">🧘 Wellness</div>
    <div class="cat-chip"        id="tab-outdoors" data-cat="Outdoors" onclick="setCat('Outdoors',this)">🥾 Outdoors</div>
    <div class="cat-chip"        id="tab-music" data-cat="Music" onclick="setCat('Music',this)">🎵 Music</div>
    <div class="cat-chip"        id="tab-arts" data-cat="Arts" onclick="setCat('Arts',this)">🎬 Arts</div>
  </div>

  <div class="content">
    <div class="events-list" id="events-container"></div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" id="nav-discover" data-page="home" href="home.html">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Discover
    </a>
    <a class="nav-item" id="nav-my-events" data-page="my-events" href="my-events.html">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      My Events
    </a>
    <a class="nav-item" id="nav-profile" data-page="profile" href="profile.html">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
  </nav>
</div>

<!-- iOS Add to Home Screen banner -->
<div id="ios-banner" class="ios-banner" style="display:none">
  <div class="ios-banner-icon">
    <svg width="24" height="19" viewBox="0 0 36 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M2 25 Q9 12 18 18 Q27 12 34 25 L18 17 Z" fill="white"/>
  <path d="M0 15 Q6 5 13 10 Q20 5 26 15 L13 9 Z" fill="white"/>
  <path d="M18 8 Q22 2 27 5 Q32 2 36 8 L27 4.5 Z" fill="white"/>
</svg>
  </div>
  <div class="ios-banner-text">
    <strong>Add Flock to your Home Screen</strong>
    <span>Tap <strong>Share</strong> then <strong>"Add to Home Screen"</strong> for the full app experience 🐦</span>
  </div>
  <button class="ios-banner-close" onclick="dismissBanner()">✕</button>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script>
'use strict';
Flock.requireAuth();
setActiveNav('home');

/* ── iOS install prompt ────────────────────────────────── */
(function() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase());
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
  const dismissed = localStorage.getItem('flock_banner');
  if (isIOS && !isStandalone && !dismissed) {
    document.getElementById('ios-banner').style.display = 'flex';
  }
})();
function dismissBanner() {
  localStorage.setItem('flock_banner','1');
  document.getElementById('ios-banner').style.display = 'none';
}

const prefs = Flock.getPrefs();
const profile = Flock.getProfile();

// Greeting
const greeting = document.getElementById('greeting-text');
const hr = new Date().getHours();
const greetWord = hr < 12 ? 'Morning' : hr < 17 ? 'Afternoon' : 'Evening';
greeting.textContent = `Good ${greetWord}${profile.name ? ', ' + profile.name.split(' ')[0] : ''} 👋`;

// Populate city select
const citySel = document.getElementById('city-filter');
CITIES.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c; opt.textContent = '📍 ' + c;
  if (c === prefs.city) opt.selected = true;
  citySel.appendChild(opt);
});
document.getElementById('distance-filter').value = prefs.distance || 25;

let activeCity = prefs.city || 'London';
let activeDist = prefs.distance || 25;
let activeCat  = 'All';

function setCat(cat, el) {
  activeCat = cat;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderEvents();
}

function applyFilters() {
  activeCity = document.getElementById('city-filter').value;
  activeDist = parseInt(document.getElementById('distance-filter').value);
  renderEvents();
}

function renderEvents() {
  let items = EVENTS.filter(e => {
    if (e.city !== activeCity) return false;
    if (activeDist !== 999 && e.dist > activeDist) return false;
    if (activeCat !== 'All' && e.category !== activeCat) return false;
    return true;
  });

  const list = document.getElementById('events-list');

  if (items.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <h3>No events found</h3>
        <p>Try a different city, increasing your distance, or choosing a different category.</p>
      </div>`;
    return;
  }

  // Format date nicely
  function fmtDate(d) {
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  }

  // Mini avatar dots for card
  function miniAvatars(count) {
    const shown = Math.min(count, 3);
    const colors = ['#F97316','#8B5CF6','#3B82F6','#EF4444'];
    let html = '<div class="att-avatars">';
    for (let i=0;i<shown;i++) html += `<div class="att-avatar" style="background:${colors[i%colors.length]}">${'ABCDEFGHIJ'[i]}</div>`;
    html += '</div>';
    return html;
  }

  list.innerHTML = items.map(e => `
    <a class="event-card" href="event.html?id=${e.id}" data-test="event-card" data-event-id="${e.id}">
      <div class="card-head" style="background:${e.gradient}">
        <span class="card-emoji">${e.emoji}</span>
        <span class="card-cat-badge">${e.category}</span>
        <span class="card-price-badge">${e.price}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${e.title}</div>
        <div class="card-meta">
          <span class="meta-item">📅 ${fmtDate(e.date)}</span>
          <span class="meta-item">🕐 ${e.time}</span>
          <span class="meta-item">📍 ${e.venue}</span>
          <span class="meta-item" style="color:${e.dist>10?'var(--text3)':'var(--ok)'}">
            ${e.dist < 1 ? 'Nearby' : e.dist + ' mi away'}
          </span>
        </div>
        <div class="card-foot">
          <div class="attendee-row">
            ${miniAvatars(e.attendees)}
            <span class="att-count">${e.attendees} going · ${e.maxAttendees - e.attendees} spots left</span>
          </div>
          <span class="card-price">${e.price === 'Free' ? 'Free' : e.price}</span>
        </div>
      </div>
    </a>`).join('');
}

renderEvents();
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
<script src="js/desktop-sidebar.js"></script>
</body>
</html>
