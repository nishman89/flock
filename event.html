<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Flock — Event</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { overflow: hidden }
    .detail-shell { height: 100svh; display:flex; flex-direction:column; }
    @media(min-width:500px){ .detail-shell{ height:844px } }
    .detail-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom: 0 }
  </style>
</head>
<body>
<div class="app-shell">
<div class="detail-shell">

  <div class="detail-scroll" id="detail-content">
    <!-- rendered by JS -->
  </div>

  <div class="detail-cta" id="detail-cta"></div>

</div>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script>
'use strict';
Flock.requireAuth();

const id = new URLSearchParams(location.search).get('id');
const ev = EVENTS.find(e => e.id === id);
if (!ev) { location.href = 'home.html'; }

function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function buildAttendees() {
  const shown = Math.min(ev.attendees, SAMPLE_ATTENDEES.length, 8);
  const extra = ev.attendees - shown;
  let html = '<div class="attendee-grid">';
  for (let i=0;i<shown;i++) {
    const a = SAMPLE_ATTENDEES[i];
    html += `<div class="attendee-bubble">
      <div class="att-circle" style="background:${a.color}">${a.name.split(' ').map(x=>x[0]).join('')}</div>
      <div class="att-name">${a.name}</div>
    </div>`;
  }
  if (extra > 0) {
    html += `<div class="attendee-bubble more-bubble">
      <div class="att-circle">+${extra}</div>
      <div class="att-name">more</div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function render() {
  const joined = Flock.isJoined(id);
  const profile = Flock.getProfile();
  const spotsLeft = ev.maxAttendees - ev.attendees;

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero" style="background:${ev.gradient}">
      <button class="detail-back" onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span class="detail-emoji">${ev.emoji}</span>
    </div>

    <div class="detail-body">
      <div class="detail-cat">${ev.category.toUpperCase()} · ${ev.dist < 1 ? 'Nearby' : ev.dist + ' miles away'}</div>
      <div class="detail-title">${ev.title}</div>

      <div class="detail-info-grid">
        <div class="detail-info-row">
          <span class="detail-info-icon">📅</span>
          <div class="detail-info-text">
            <span class="detail-info-label">Date &amp; Time</span>
            ${fmtDate(ev.date)} at ${ev.time} · ${ev.duration}
          </div>
        </div>
        <div class="detail-info-row">
          <span class="detail-info-icon">📍</span>
          <div class="detail-info-text">
            <span class="detail-info-label">Venue</span>
            ${ev.venue}<br>
            <span style="color:var(--text3);font-size:13px">${ev.address}</span>
          </div>
        </div>
        <div class="detail-info-row">
          <span class="detail-info-icon">💰</span>
          <div class="detail-info-text">
            <span class="detail-info-label">Price</span>
            ${ev.price}
          </div>
        </div>
        <div class="detail-info-row">
          <span class="detail-info-icon">👥</span>
          <div class="detail-info-text">
            <span class="detail-info-label">Attendance</span>
            ${ev.attendees} going · <span style="color:${spotsLeft<5?'var(--err)':'var(--ok)'}">${spotsLeft} spots remaining</span>
          </div>
        </div>
        <div class="detail-info-row">
          <span class="detail-info-icon">🤝</span>
          <div class="detail-info-text">
            <span class="detail-info-label">Open to</span>
            ${ev.friendType === 'Both' ? 'Everyone' : ev.friendType + ' only'} · ${ev.ageGroup}
          </div>
        </div>
      </div>

      <div class="detail-section-title">About this event</div>
      <p class="detail-desc">${ev.desc}</p>

      <div class="detail-section-title">Tags</div>
      <div class="detail-tags">
        ${ev.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}
      </div>

      <div class="detail-section-title">Who's going (${ev.attendees + (joined ? 1 : 0)})</div>
      ${joined ? `
        <div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-radius:10px;background:#F0FDF4;border:1px solid #BBF7D0;margin-bottom:12px;padding:12px 14px">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff">${(profile.name||'Y')[0].toUpperCase()}</div>
          <div><div style="font-size:13px;font-weight:700;color:var(--ok)">You're going! 🎉</div><div style="font-size:12px;color:var(--text3)">${profile.name || 'You'}</div></div>
        </div>` : ''}
      ${buildAttendees()}
    </div>`;

  // CTA button
  document.getElementById('detail-cta').innerHTML = joined
    ? `<button class="btn btn-joined" onclick="toggleJoin()">✓ You're going — tap to leave</button>`
    : `<button class="btn btn-primary" onclick="toggleJoin()">Join Flock! 🐦</button>`;
}

function toggleJoin() {
  if (Flock.isJoined(id)) {
    if (confirm('Are you sure you want to leave this event?')) {
      Flock.leaveEvent(id);
    }
  } else {
    Flock.joinEvent(id);
  }
  render();
}

render();
</script>
</body>
</html>
